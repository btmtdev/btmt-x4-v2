name: Deploy Frontend

on:
  push:
    branches: [main, uat]
    paths:
      - "x4-app/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - uat
          - production

jobs:
  deploy-iis:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Set environment
        shell: powershell
        run: |
          if ("${{ github.event.inputs.environment }}" -eq "production" -or "${{ github.ref }}" -eq "refs/heads/main") {
            echo "IIS_PATH=D:\Web\x4-app" >> $env:GITHUB_ENV
            echo "VITE_API_URL=https://api.btmt.co.th/x4/core" >> $env:GITHUB_ENV
            echo "VITE_SHIPPING_API_URL=https://api.btmt.co.th/x4/shipping" >> $env:GITHUB_ENV
          } else {
            echo "IIS_PATH=D:\Web\x4dev-app" >> $env:GITHUB_ENV
            echo "VITE_API_URL=https://api.btmt.co.th/x4-uat/core" >> $env:GITHUB_ENV
            echo "VITE_SHIPPING_API_URL=https://api.btmt.co.th/x4-uat/shipping" >> $env:GITHUB_ENV
          }

      - name: Install dependencies
        shell: powershell
        working-directory: x4-app
        run: npm ci

      - name: Build
        shell: powershell
        working-directory: x4-app
        run: npm run build
        env:
          VITE_API_URL: ${{ env.VITE_API_URL }}
          VITE_SHIPPING_API_URL: ${{ env.VITE_SHIPPING_API_URL }}

      - name: Deploy to IIS
        shell: powershell
        run: |
          Copy-Item -Path "x4-app/dist/*" -Destination "${{ env.IIS_PATH }}" -Recurse -Force

  deploy-amplify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set environment
        run: |
          if [[ "${{ github.event.inputs.environment }}" == "production" || "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "AMPLIFY_BRANCH=main" >> $GITHUB_ENV
            echo "VITE_API_URL=https://api.btmt.co.th/x4/core" >> $GITHUB_ENV
            echo "VITE_SHIPPING_API_URL=https://api.btmt.co.th/x4/shipping" >> $GITHUB_ENV
          else
            echo "AMPLIFY_BRANCH=uat" >> $GITHUB_ENV
            echo "VITE_API_URL=https://api.btmt.co.th/x4-uat/core" >> $GITHUB_ENV
            echo "VITE_SHIPPING_API_URL=https://api.btmt.co.th/x4-uat/shipping" >> $GITHUB_ENV
          fi

      - name: Install and build
        working-directory: x4-app
        run: |
          npm ci
          npm run build
        env:
          VITE_API_URL: ${{ env.VITE_API_URL }}
          VITE_SHIPPING_API_URL: ${{ env.VITE_SHIPPING_API_URL }}

      - name: Deploy to Amplify
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-southeast-1
        run: |
          cd x4-app
          zip -r deploy.zip dist/*
          DEPLOY=$(aws amplify create-deployment --app-id d1l9ah1vkxp677 --branch-name ${{ env.AMPLIFY_BRANCH }})
          URL=$(echo $DEPLOY | jq -r '.zipUploadUrl')
          JOB_ID=$(echo $DEPLOY | jq -r '.jobId')
          curl -T deploy.zip "$URL" -H "Content-Type: application/zip"
          aws amplify start-deployment --app-id d1l9ah1vkxp677 --branch-name ${{ env.AMPLIFY_BRANCH }} --job-id $JOB_ID
