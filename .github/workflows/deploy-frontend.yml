name: Deploy Frontend

on:
  push:
    branches: [main, uat]
    paths:
      - "x4-app/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - uat
          - production

jobs:
  deploy-iis:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Set environment
        shell: powershell
        run: |
          if ("${{ github.event.inputs.environment }}" -eq "production" -or "${{ github.ref }}" -eq "refs/heads/main") {
            echo "IIS_PATH=D:\Web\x4-app" >> $env:GITHUB_ENV
            echo "VITE_API_URL=https://api.btmt.co.th/x4/core" >> $env:GITHUB_ENV
            echo "VITE_SHIPPING_API_URL=https://api.btmt.co.th/x4/shipping" >> $env:GITHUB_ENV
          } else {
            echo "IIS_PATH=D:\Web\x4dev-app" >> $env:GITHUB_ENV
            echo "VITE_API_URL=https://api.btmt.co.th/x4-uat/core" >> $env:GITHUB_ENV
            echo "VITE_SHIPPING_API_URL=https://api.btmt.co.th/x4-uat/shipping" >> $env:GITHUB_ENV
          }

      - name: Install dependencies
        shell: powershell
        working-directory: x4-app
        run: npm ci

      - name: Build
        shell: powershell
        working-directory: x4-app
        run: npm run build
        env:
          VITE_API_URL: ${{ env.VITE_API_URL }}
          VITE_SHIPPING_API_URL: ${{ env.VITE_SHIPPING_API_URL }}

      - name: Deploy to IIS
        shell: powershell
        run: |
          Copy-Item -Path "x4-app/dist/*" -Destination "${{ env.IIS_PATH }}" -Recurse -Force
